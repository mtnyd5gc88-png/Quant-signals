<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quant Signals</title>

<style>
body{
  background:#0b1220;
  color:#e2e8f0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  margin:0;
}

/* HEADER */
.header{
  padding:25px 40px;
  border-bottom:1px solid #1e293b;
}

.title{
  font-size:28px;
  font-weight:700;
}

.subtitle{
  color:#94a3b8;
  font-size:13px;
}

/* SECTION */
.section{
  padding:30px 40px;
}

.section h2{
  margin-bottom:15px;
}

/* SEARCH */
.search{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  padding:18px;
  border-radius:14px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.big{
  font-size:22px;
  font-weight:700;
}

.meta{
  font-size:13px;
  margin-top:8px;
  opacity:0.9;
}

/* TOP PICKS */
.top-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.top-card{
  padding:25px;
  border-radius:16px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
}

.modal-content{
  background:#0b1220;
  margin:60px auto;
  padding:25px;
  width:80%;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">Quant Signals</div>
  <div class="subtitle">Probability-based stock ranking engine</div>
</div>

<!-- TOP PICKS -->
<div class="section">
  <h2>⭐ Top Signals</h2>
  <div class="top-grid" id="top"></div>
</div>

<!-- SEARCH -->
<div class="section">
  <input id="search" class="search" placeholder="Search ticker (e.g. NVDA)">
</div>

<!-- ALL -->
<div class="section">
  <h2>All Signals</h2>
  <div class="grid" id="signals"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" id="modal-content"></div>
</div>

<script>

const BASE = "/Quant-signals/website"
const DATA_URL = `${BASE}/data/predictions.json?nocache=` + Date.now()

let ALL_DATA = []

function getSignal(prob){
  if(prob >= 0.55) return "BUY"
  if(prob >= 0.40) return "HOLD"
  return "CASH"
}

function getColor(signal){
  if(signal==="BUY") return "#065f46"
  if(signal==="HOLD") return "#78350f"
  return "#7f1d1d"
}

function renderTop(data){
  const container = document.getElementById("top")
  container.innerHTML = ""

  data.slice(0,3).forEach(stock=>{
    const signal = getSignal(stock.prob_up)

    const card = document.createElement("div")
    card.className="top-card"
    card.style.background=getColor(signal)

    card.onclick=()=>openChart(stock.ticker)

    card.innerHTML=`
      <div class="big">${stock.ticker}</div>
      <div>${signal}</div>
      <div class="meta">${(stock.prob_up*100).toFixed(1)}%</div>
    `

    container.appendChild(card)
  })
}

function render(data){
  const container=document.getElementById("signals")
  container.innerHTML=""

  data.forEach(stock=>{
    const signal=getSignal(stock.prob_up)

    const card=document.createElement("div")
    card.className="card"
    card.style.background=getColor(signal)

    card.onclick=()=>openChart(stock.ticker)

    card.innerHTML=`
      <div><b>${stock.ticker}</b></div>
      <div>${signal}</div>
      <div class="meta">${(stock.prob_up*100).toFixed(1)}%</div>
    `

    container.appendChild(card)
  })
}

fetch(DATA_URL)
.then(r=>r.json())
.then(data=>{
  ALL_DATA=data.sort((a,b)=>b.prob_up-a.prob_up)
  renderTop(ALL_DATA)
  render(ALL_DATA)
})

document.getElementById("search").addEventListener("input",e=>{
  const k=e.target.value.toUpperCase()

  if(k===""){
    render(ALL_DATA)
    return
  }

  const f=ALL_DATA.filter(s=>s.ticker===k)

  if(f.length===0){
    document.getElementById("signals").innerHTML="No signal"
  }else{
    render(f)
  }
})

function openChart(ticker){
  const modal=document.getElementById("modal")
  const content=document.getElementById("modal-content")

  modal.style.display="block"

  content.innerHTML=`
    <h2>${ticker}</h2>
    <div id="tv_chart" style="height:500px;"></div>
  `

  if(!window.tvLoaded){
    const s=document.createElement("script")
    s.src="https://s3.tradingview.com/tv.js"
    s.onload=()=>createChart(ticker)
    document.body.appendChild(s)
    window.tvLoaded=true
  }else{
    createChart(ticker)
  }
}

function createChart(ticker){
  new TradingView.widget({
    container_id:"tv_chart",
    symbol:"NASDAQ:"+ticker,
    theme:"dark",
    width:"100%",
    height:500
  })
}

function closeModal(){
  document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
