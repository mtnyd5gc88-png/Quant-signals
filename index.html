<script>

const BASE = "/Quant-signals/website"
const DATA_URL = `${BASE}/data/predictions.json?nocache=` + Date.now()

let ALL_DATA = []

// ❌ 삭제 (이제 안씀)
// function getSignal(prob){...}

// ===== TOP =====
function renderTop(data){
  const container = document.getElementById("top")
  container.innerHTML = ""

  data.forEach((stock,i)=>{

    const signal = stock.signal   // 🔥 핵심
    const target = stock.price * (1 + stock.target_return)

    const card = document.createElement("div")
    card.className="top-card"

    card.onclick=()=>openChart(stock.ticker)

    card.innerHTML=`
      <div class="big">#${i+1} ${stock.ticker}</div>
      <div class="${signal.toLowerCase()}">${signal}</div>

      <div class="meta">
        ${(stock.prob_up*100).toFixed(1)}%<br>
        $${stock.price.toFixed(2)} → $${target.toFixed(2)}<br>
        ${(stock.target_return*100).toFixed(2)}%
      </div>
    `

    container.appendChild(card)
  })
}

// ===== ALL =====
function render(data){
  const container=document.getElementById("signals")
  container.innerHTML=""

  data.forEach(stock=>{

    const signal = stock.signal   // 🔥 핵심
    const target = stock.price * (1 + stock.target_return)

    const card=document.createElement("div")
    card.className="card"

    card.onclick=()=>openChart(stock.ticker)

    card.innerHTML=`
      <div><b>${stock.ticker}</b></div>
      <div class="${signal.toLowerCase()}">${signal}</div>

      <div class="meta">
        ${(stock.prob_up*100).toFixed(1)}%<br>
        $${stock.price.toFixed(2)} → $${target.toFixed(2)}<br>
        ${(stock.target_return*100).toFixed(2)}%
      </div>
    `

    container.appendChild(card)
  })
}

// ===== LOAD =====
fetch(DATA_URL)
.then(r=>r.json())
.then(data=>{

  // 전체는 prob 기준
  ALL_DATA = data.sort((a,b)=>b.prob_up-a.prob_up)

  // 🔥 Top = BUY만 + 수익률 기준
  const TOP_DATA = data
    .filter(s => s.signal === "BUY")   // 🔥 핵심
    .sort((a,b)=>b.target_return-a.target_return)
    .slice(0,3)

  renderTop(TOP_DATA)
  render(ALL_DATA)
})

// ===== SEARCH =====
document.getElementById("search").addEventListener("input",e=>{
  const k=e.target.value.toUpperCase()

  if(k===""){
    render(ALL_DATA)
    return
  }

  const f=ALL_DATA.filter(s=>s.ticker===k)

  if(f.length===0){
    document.getElementById("signals").innerHTML="No signal found"
  }else{
    render(f)
  }
})

// ===== BACKTEST =====
function openBacktest(){
  const modal=document.getElementById("modal")
  const content=document.getElementById("modal-content")

  modal.style.display="block"

  content.innerHTML=`
    <h2>Backtest</h2>
    <img src="${BASE}/charts/equity_curve.png" width="100%"><br><br>
    <img src="${BASE}/charts/strategy_vs_spy.png" width="100%"><br><br>
    <img src="${BASE}/charts/drawdown.png" width="100%">
  `
}

// ===== REPORT =====
function openReport(){
  const modal=document.getElementById("modal")
  const content=document.getElementById("modal-content")

  modal.style.display="block"

  fetch(`${BASE}/reports/performance_report.txt`)
  .then(r=>r.text())
  .then(text=>{
    content.innerHTML=`<pre>${text}</pre>`
  })
}

// ===== CHART =====
function openChart(ticker){
  const modal=document.getElementById("modal")
  const content=document.getElementById("modal-content")

  modal.style.display="block"

  content.innerHTML=`
    <h2>${ticker}</h2>
    <div id="tv_chart" style="height:500px;"></div>
  `

  if(!window.tvLoaded){
    const s=document.createElement("script")
    s.src="https://s3.tradingview.com/tv.js"
    s.onload=()=>createChart(ticker)
    document.body.appendChild(s)
    window.tvLoaded=true
  }else{
    createChart(ticker)
  }
}

function createChart(ticker){
  new TradingView.widget({
    container_id:"tv_chart",
    symbol:"NASDAQ:"+ticker,
    theme:"light",
    width:"100%",
    height:500
  })
}

// ===== MODAL =====
function closeModal(){
  document.getElementById("modal").style.display="none"
}

</script>
