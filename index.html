<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quant Signals</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

h1{
margin-bottom:20px;
}

.legend{
display:flex;
height:50px;
margin-bottom:20px;
border-radius:10px;
overflow:hidden;
}

.legend-item{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.red{background:#7f1d1d;}
.yellow{background:#854d0e;}
.green{
background:linear-gradient(to right, rgb(0,100,80), rgb(0,255,80));
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
padding:20px;
border-radius:12px;
cursor:pointer;
}

button{
padding:10px 20px;
margin-bottom:20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* 모달 */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
overflow:auto;
}

.modal-content{
background:#0f172a;
margin:50px auto;
padding:20px;
width:80%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Today's Quant Signals</h1>

<!-- 백테스트 버튼 -->
<button onclick="openBacktest()">📊 View Backtest</button>

<div class="legend">
  <div class="legend-item red">STAY IN CASH</div>
  <div class="legend-item yellow">HOLD</div>
  <div class="legend-item green">BUY (LOW → HIGH)</div>
</div>

<div class="container" id="signals"></div>

<!-- 모달 -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" id="modal-content"></div>
</div>

<script>

function getSignal(prob){
    if(prob >= 0.55) return "BUY"
    if(prob >= 0.40) return "HOLD"
    return "CASH"
}

function getColor(signal, target){
    if(signal === "CASH") return "#7f1d1d"
    if(signal === "HOLD") return "#854d0e"

    let intensity = Math.min(Math.max(target, 0), 0.15) / 0.15
    let green = Math.floor(100 + intensity * 155)
    return `rgb(0, ${green}, 80)`
}

// 🔥 백테스트 모달
function openBacktest(){
  const modal = document.getElementById("modal")
  const content = document.getElementById("modal-content")

  modal.style.display = "block"

  content.innerHTML = `
    <h2>Strategy Performance</h2>

    <img src="charts/equity_curve.png" width="100%"><br><br>
    <img src="charts/strategy_vs_spy.png" width="100%"><br><br>
    <img src="charts/drawdown.png" width="100%">
  `
}

function closeModal(){
  document.getElementById("modal").style.display = "none"
}

fetch("./data/predictions.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("signals")

data.forEach(stock => {

let signal = getSignal(stock.prob_up)

// 2차 필터
if(signal === "BUY" && stock.target_return < 0){
    signal = "HOLD"
}

const color = getColor(signal, stock.target_return)

const card = document.createElement("div")
card.className = "card"
card.style.background = color

const targetPrice = stock.price * (1 + stock.target_return)

// 👉 카드 클릭하면 상세 (선택적으로 확장 가능)
card.onclick = () => {
  alert(`${stock.ticker}\nProb: ${stock.prob_up}`)
}

card.innerHTML = `
<div style="font-size:22px;font-weight:bold;">${stock.ticker}</div>
<div style="font-weight:bold;">${signal}</div>
<div>Probability: ${(stock.prob_up*100).toFixed(1)}%</div>
<div>Target Return: ${(stock.target_return*100).toFixed(2)}%</div>
<div>Price: $${stock.price.toFixed(2)}</div>
<div>Target Price: $${targetPrice.toFixed(2)}</div>
`

container.appendChild(card)

})

})

</script>

</body>
</html>
