<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quanty Signals</title>

<style>
body{
  background:#0b1220;
  color:#e2e8f0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  padding:40px;
}

h1{
  font-size:32px;
  margin-bottom:5px;
}

.sub{
  color:#94a3b8;
  margin-bottom:20px;
}

#status{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:30px;
}

/* TOP SIGNALS */
.top-container{
  display:flex;
  gap:20px;
  margin-bottom:40px;
}

.top-card{
  flex:1;
  background:#111827;
  padding:20px;
  border-radius:12px;
  border:1px solid #16c784;
}

/* ALL SIGNALS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  padding:15px;
  border-radius:12px;
  background:#111827;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

/* SIGNAL */
.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
}

.buy{background:#16c784;}
.hold{background:#854d0e;}
.cash{background:#7f1d1d;}

/* RETURN 강조 */
.return{
  font-size:22px;
  font-weight:700;
  margin:10px 0;
}

/* BAR */
.bar{
  height:5px;
  background:#1e293b;
  border-radius:3px;
  margin-top:5px;
}

.bar div{
  height:100%;
  background:#16c784;
}
</style>
</head>

<body>

<h1>Quanty</h1>
<div class="sub">AI-driven short-term trading signals</div>
<div id="status"></div>

<h2>🔥 Top Opportunities</h2>
<div class="top-container" id="top"></div>

<h2>All Signals</h2>
<div class="container" id="signals"></div>

<script>

const DATA_URL = "data/predictions.json?nocache=" + Date.now()

fetch(DATA_URL)
.then(res => res.json())
.then(data => {

document.getElementById("status").innerText =
  `🟢 Live • ${data.length} signals • Updated ${new Date().toLocaleTimeString()}`

// ===== TOP SIGNALS =====
const top = data
  .filter(d => d.signal === "BUY")
  .sort((a,b)=> b.target_return - a.target_return)
  .slice(0,3)

const topContainer = document.getElementById("top")

top.forEach(stock => {

const targetPrice = stock.price * (1 + stock.target_return)

topContainer.innerHTML += `
<div class="top-card">
  <b>${stock.ticker}</b>
  <span class="badge buy">BUY</span>

  <div class="return">
    +${(stock.target_return*100).toFixed(1)}%
  </div>

  <div>
    Confidence ${(stock.prob_up*100).toFixed(0)}%
    <div class="bar">
      <div style="width:${stock.prob_up*100}%"></div>
    </div>
  </div>

  <div style="margin-top:8px;">
    $${stock.price.toFixed(2)} → $${targetPrice.toFixed(2)}
  </div>
</div>
`
})

// ===== ALL SIGNALS =====
const container = document.getElementById("signals")

data.forEach(stock => {

const targetPrice = stock.price * (1 + stock.target_return)

container.innerHTML += `
<div class="card">
  <b>${stock.ticker}</b>
  <span class="badge ${stock.signal.toLowerCase()}">${stock.signal}</span>

  <div class="return">
    ${(stock.target_return*100).toFixed(1)}%
  </div>

  <div>
    Confidence ${(stock.prob_up*100).toFixed(0)}%
    <div class="bar">
      <div style="width:${stock.prob_up*100}%"></div>
    </div>
  </div>

  <div style="margin-top:6px;">
    $${stock.price.toFixed(2)} → $${targetPrice.toFixed(2)}
  </div>
</div>
`
})

})
</script>

</body>
</html>
